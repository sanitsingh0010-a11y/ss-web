<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transit Pass</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; }
    img { display: block; width: 100%; height: auto; }
    #err { padding: 20px; font-family: sans-serif; color: red; }
  </style>
</head>
<body>
  <img id="ss" alt="" />
  <div id="err" style="display:none">Image not found.</div>

  <script>
    const DEFAULT_IMAGE = './default.png';

    let img = decodeURIComponent(new URLSearchParams(location.search).get("img") || "");

    if (!img) {
      img = DEFAULT_IMAGE;
    }

    if (img) {
      let fileId = null;

      if (img.startsWith('http')) {
        // Try pattern: /d/FILE_ID/view or /d/FILE_ID
        const driveMatch = img.match(/\/d\/([a-zA-Z0-9_\-]+)/);
        if (driveMatch) {
          fileId = driveMatch[1];
        } else {
          // Try pattern: ?id=FILE_ID or &id=FILE_ID
          const queryMatch = img.match(/[?&]id=([a-zA-Z0-9_\-]+)/);
          if (queryMatch) {
            fileId = queryMatch[1];
          }
        }

        if (fileId) {
          img = `https://drive.google.com/thumbnail?id=${fileId}&sz=w2048-h2048`;
        }
      }

      const el = document.getElementById("ss");

      el.onerror = () => {
        el.style.display = "none";
        document.getElementById("err").style.display = "block";
        document.getElementById("err").textContent = "Failed to load image.";
      };

      el.src = img;
    } else {
      document.getElementById("err").style.display = "block";
      document.getElementById("err").textContent = "No image available.";
    }
  </script>
</body>
</html>
